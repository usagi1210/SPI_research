# Ultra-light full-image ablation: separable-conv proximal network.
model_name: FullSharedDUN
image_size: 256
meas_size: 81
num_stages: 7
channels: [16, 32, 64]
prox_type: sep
matrix_train: true

epochs: 200
batch_size: 1
lr: 1.0e-4
lr_min: 1.0e-6
loss: l1
consistency_weight: 0.01
patches_per_image: 20

train_dir: ../../../data/train/BSD400
val_dir: ../../../data/test/Set11
result_dir: ../../../results/ours/full_shared_dun_tiny

val_every: 1
save_freq: 10
iter_step: 50
num_workers: 4
